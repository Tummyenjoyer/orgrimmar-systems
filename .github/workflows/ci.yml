name: CI/CD Pipeline - Orgrimmar Systems

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm install
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm install
      - run: npm test

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/orgrimmar-systems:${{ github.run_number }}

  staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker
    environment: staging
    steps:
      - run: echo "Deployment auf Staging erfolgreich"

  production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: staging
    environment: production
    steps:
      - run: echo "Deployment auf Production erfolgreich"

      